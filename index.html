<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <title>文明追星警示</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            width: 100vw;
            height: 100vh;
            background: #000;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            gap: 40px;
        }
        /* 闪烁动画，醒目警告效果 */
        @keyframes flash {
            0%, 100% { color: #ff0000; text-shadow: 0 0 15px red; }
            50% { color: #fff; text-shadow: 0 0 20px #ff3333; }
        }
        .warn-title {
            font-size: 80px;
            font-weight: 900;
            font-family: "黑体", sans-serif;
            animation: flash 0.6s infinite;
        }
        .target {
            font-size: 48px;
            font-weight: 900;
            color: #ffdd00;
            text-shadow: 0 0 12px gold;
        }
        .text {
            font-size: 36px;
            font-weight: bold;
            color: #ff2222;
            line-height: 2;
            text-align: center;
        }
        .tip {
            margin-top: 30px;
            font-size: 28px;
            font-weight: bold;
            color: #ffcc00;
        }
    </style>
</head>
<body>
    <div class="warn-title">严正警示！😠</div>
    <div class="target">警示目标：榕5 651全体人员</div>
    <div class="text">
        禁止恶意造谣、恶搞、辱骂蔡徐坤<br>
        拒绝网络黑粉、恶意玩梗人身攻击<br>
        网络并非法外之地，言论需遵守法律底线<br>
        恶意抹黑他人将承担相应法律责任
    </div>
    <div class="tip">哎呦你干嘛啊！😠</div>
</body>
</html>
